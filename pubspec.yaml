name: payment_tracker
description: SMS Payment Tracker - See all your incoming and outgoing payments

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  another_telephony: ^0.4.1     # Maintained fork of telephony for SMS reading
  permission_handler: ^11.3.0 # Runtime permissions
  intl: ^0.19.0               # Date/number formatting
  fl_chart: ^0.68.0           # Charts for spending overview
  shared_preferences: ^2.2.3  # Local storage for settings
  http: ^1.2.0                # For AI API calls
  google_generative_ai: ^0.4.0 # Google Gemini AI
  sqflite: ^2.3.0             # Local SQLite database
  path: ^1.8.3                # Path utilities for database

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
